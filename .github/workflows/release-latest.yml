name: Build & Release Latest

on:
  push:
    branches: [main, master]

jobs:
  release:
    name: Build & publish latest
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate static site
        run: npm run generate

      - name: Archive build output
        run: |
          cd .output/public
          zip -r ../../yunikon-latest.zip .
          echo "Build archived: $(du -sh ../../yunikon-latest.zip | cut -f1)"

      - name: Delete previous latest release
        run: gh release delete latest --yes --cleanup-tag 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create latest release
        run: |
          gh release create latest yunikon-latest.zip \
            --title "Latest Build" \
            --notes "🚀 Build automatique depuis le commit [\`${GITHUB_SHA::7}\`]($GITHUB_SERVER_URL/$GITHUB_REPOSITORY/commit/$GITHUB_SHA)" \
            --latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
